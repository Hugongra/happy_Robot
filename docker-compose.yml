services:
  backend:
    build: ./backend
    container_name: carrier-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_KEY: ${VITE_API_KEY}
    container_name: carrier-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Caddy reverse proxy gives us automatic HTTPS in production (Let's Encrypt)
  # In local dev you don't need it; just hit http://localhost:5173 / :8000 directly.
  # Uncomment when deploying to a domain.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - backend
  #     - frontend

volumes:
  backend_data:
  # caddy_data:
  # caddy_config:
