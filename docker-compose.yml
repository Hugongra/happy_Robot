services:
  backend:
    build: ./backend
    container_name: carrier-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_KEY: ${VITE_API_KEY}
    container_name: carrier-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Production HTTPS with Let's Encrypt — replace domains in caddy/Caddyfile first.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - backend
  #     - frontend

  # Local HTTPS (self-signed via Caddy internal CA). See docs/security.md
  caddy:
    profiles: ["https"]
    image: caddy:2-alpine
    container_name: carrier-caddy-local
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8444:8444"
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_local_data:/data
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:

  # Uncomment for production VPS deploy with real domains (see caddy/Caddyfile):
  # caddy_data:
  # caddy_config:

  # Used by: docker compose --profile https up
  caddy_local_data:
