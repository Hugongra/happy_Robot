<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/acme-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Logistics Carrier Operations</title>
    <style>
      :root {
        --bg: #f1f5f9;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --border: #cbd5e1;
        --border-strong: #1d4ed8;
        --text: #0f172a;
        --text-secondary: #475569;
        --muted: #64748b;
        --accent: #1d4ed8;
        --accent-light: #3b82f6;
        --accent-bg: #dbeafe;
        --accent-dark: #1e3a8a;
        --success: #22c55e;
        --success-bright: #4ade80;
        --warn: #f97316;
        --danger: #ef4444;
        --navy: #0f172a;
        --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.04);
        --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.1);
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      button { font: inherit; cursor: pointer; }
      @keyframes live-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      .live-in-progress-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        color: #ef4444;
        background: #fef2f2;
        border: 1px solid #fecaca;
        padding: 4px 10px;
        border-radius: 999px;
      }
      .live-in-progress-badge .live-pulse-dot {
        animation: live-pulse 1.4s ease-in-out infinite;
      }
      @keyframes call-row-flash {
        0% { background-color: #fef9c3; }
        70% { background-color: #fef9c3; }
        100% { background-color: transparent; }
      }
      .call-row-flash td {
        animation: call-row-flash 2s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
