# Fly.io config for the React frontend (nginx + SPA).
# Build-time env vars are passed via: fly deploy --build-arg ...

app = "acme-carrier-app-hugog"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
